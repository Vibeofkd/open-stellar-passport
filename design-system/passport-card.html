<!-- @dsCard group="Components" name="Passport card" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Passport card — Agent Passport</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root { --ink-950:#08080c; --violet-soft:#9d86ff; --cyan:#22d3ee; --verified:#34d399; --amber:#fbbf24; --fg:#ececf3; --muted:#8b8ba3; --faint:#5b5b73; }
      * { box-sizing:border-box; }
      body { margin:0; min-height:100vh; display:grid; place-items:center; padding:40px; font-family:"Inter",sans-serif; color:var(--fg);
        background: radial-gradient(800px 460px at 80% -10%, rgba(124,92,255,.14), transparent 60%), var(--ink-950); }
      .card { position:relative; width:420px; aspect-ratio:1.585/1.06; overflow:hidden; border-radius:22px; border:1px solid rgba(255,255,255,.1); padding:20px;
        background:linear-gradient(155deg,#15131f 0%,#0e0d17 38%,#0b1018 100%); box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 30px 70px -30px rgba(0,0,0,.9); }
      .guil { position:absolute; right:-60px; top:-60px; width:280px; height:280px; opacity:.13; }
      .foil { position:absolute; inset:0; opacity:.28; mix-blend-mode:screen;
        background:conic-gradient(from 210deg at 70% 20%, transparent, rgba(34,211,238,.35), rgba(124,92,255,.4), transparent 60%); }
      .row { position:relative; display:flex; justify-content:space-between; align-items:flex-start; }
      .issuer { font-family:"JetBrains Mono",monospace; font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:var(--violet-soft); }
      .title { font-size:13px; font-weight:600; margin-top:2px; }
      .chip { width:36px; height:28px; border-radius:5px; background:linear-gradient(135deg, rgba(251,191,36,.85), rgba(251,191,36,.4)); display:grid; grid-template:repeat(2,1fr)/repeat(3,1fr); gap:1px; padding:3px; }
      .chip i { background:rgba(10,10,15,.4); border-radius:1px; }
      .body { position:relative; display:flex; gap:16px; margin-top:18px; }
      .portrait { position:relative; width:68px; height:88px; border-radius:6px; border:1px solid rgba(255,255,255,.1); background:#0a0a0f; overflow:hidden; display:grid; place-items:center; }
      .portrait b { font-family:"JetBrains Mono",monospace; font-size:9px; text-transform:uppercase; letter-spacing:.16em; color:rgba(157,134,255,.7); }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px 14px; align-content:start; flex:1; }
      .k { font-family:"JetBrains Mono",monospace; font-size:8.5px; text-transform:uppercase; letter-spacing:.14em; color:var(--faint); }
      .v { font-size:13px; }
      .v.mono { font-family:"JetBrains Mono",monospace; }
      .v.cy { color:var(--cyan); }
      .mrz { position:relative; margin-top:14px; border-radius:6px; padding:7px 10px; background:rgba(8,8,12,.7); border:1px solid rgba(255,255,255,.05);
        font-family:"JetBrains Mono",monospace; font-size:9.5px; letter-spacing:.12em; color:rgba(236,236,243,.7); line-height:1.55; }
      .foot { position:relative; display:flex; justify-content:space-between; align-items:center; margin-top:10px;
        font-family:"JetBrains Mono",monospace; font-size:9px; text-transform:uppercase; letter-spacing:.18em; color:var(--faint); }
      .stamp { position:absolute; right:18px; top:50%; transform:translateY(-50%) rotate(-14deg); width:96px; height:96px; border-radius:999px; border:2px solid rgba(52,211,153,.7); color:var(--verified); display:grid; place-items:center; text-align:center; }
      .stamp .a { font-family:"JetBrains Mono",monospace; font-size:8px; text-transform:uppercase; letter-spacing:.2em; opacity:.8; }
      .stamp .b { font-family:"JetBrains Mono",monospace; font-size:13px; font-weight:700; text-transform:uppercase; }
    </style>
  </head>
  <body>
    <div class="card">
      <svg class="guil" viewBox="0 0 200 200">
        <defs><radialGradient id="g" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#7c5cff"/></radialGradient></defs>
        <g fill="none" stroke="url(#g)" stroke-width="0.5">
          <ellipse cx="100" cy="100" rx="30" ry="62"/><ellipse cx="100" cy="100" rx="40" ry="72" transform="rotate(20 100 100)"/>
          <ellipse cx="100" cy="100" rx="50" ry="82" transform="rotate(40 100 100)"/><ellipse cx="100" cy="100" rx="60" ry="92" transform="rotate(60 100 100)"/>
          <ellipse cx="100" cy="100" rx="70" ry="100" transform="rotate(80 100 100)"/><ellipse cx="100" cy="100" rx="80" ry="108" transform="rotate(100 100 100)"/>
        </g>
      </svg>
      <div class="foil"></div>

      <div class="row">
        <div><div class="issuer">Stellar</div><div class="title">ZK Credential</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <span style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--faint)">P&lt;AGT</span>
          <div class="chip"><i></i><i></i><i></i><i></i><i></i><i></i></div>
        </div>
      </div>

      <div class="body">
        <div class="portrait"><b>redacted</b></div>
        <div class="grid">
          <div><div class="k">Type</div><div class="v">Agent / x402</div></div>
          <div><div class="k">Agent No.</div><div class="v mono">990155218381</div></div>
          <div><div class="k">Spend cap</div><div class="v cy mono">50 XLM</div></div>
          <div><div class="k">Holder</div><div class="v">████ hidden</div></div>
        </div>
      </div>

      <div class="mrz">
        <div>P&lt;STELLAR&lt;AGENT&lt;990155218381&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</div>
        <div>2DA67B6E26AEA8129C7DC5615&lt;7ZK&lt;BN254&lt;</div>
      </div>

      <div class="foot"><span>sealed · ledger 3147619</span><span style="width:6px;height:6px;border-radius:999px;background:var(--verified);box-shadow:0 0 8px var(--verified)"></span></div>

      <div class="stamp"><div><div class="a">verified</div><div class="b">on-chain</div><div class="a">BN254 · Soroban</div></div></div>
    </div>
  </body>
</html>
